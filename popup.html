<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; width: 220px; text-align: center; background-color: #f9f9f9; }
    h3 { margin-top: 0; color: #333; }
    button { padding: 10px 15px; font-size: 14px; font-weight: bold; cursor: pointer; background-color: #2b78e4; color: white; border: none; border-radius: 6px; width: 100%; transition: background-color 0.2s; }
    button:hover { background-color: #1a5cba; }
    button:disabled { background-color: #a0c4f5; cursor: not-allowed; }
    #status { margin-top: 15px; font-size: 13px; color: #555; word-wrap: break-word; }
  </style>
</head>
<body>
  <h3>PDF Capture</h3>
  <button id="selectRoiBtn" style="background-color: #6c757d; margin-bottom: 10px;">Select Region (Optional)</button>
  <button id="captureBtn">Save Page as PDF</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
